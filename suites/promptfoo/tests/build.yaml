- description: build — synthetic smoke
  metadata:
    taskId: build-synthetic-smoke
    lane: build
  vars:
    task: Add a function that sums an array of numbers
    file_path: src/math.ts
    language: typescript
    file_content: |
      export function sum(values: number[]): number {
        return 0;
      }
  assert:
    - type: javascript
      value: String(output ?? '').includes('+++')
    - type: javascript
      value: String(output ?? '').includes('reduce') || String(output ?? '').includes('for') || String(output ?? '').includes('+=')
  options:
    transform: '(output) => String(output ?? "").replace(/```[\\s\\S]*?```/g, "").trim()'

- description: build — template (config helper)
  metadata:
    taskId: build-config-timeout
    lane: build
  vars:
    task: Parse an optional timeout env var with default 30000
    file_path: src/config.ts
    language: typescript
    file_content: |
      export function readTimeout(): number {
        throw new Error('not implemented');
      }
  assert:
    - type: javascript
      value: String(output ?? '').includes('+++')
    - type: javascript
      value: String(output ?? '').includes('30000') || String(output ?? '').includes('30_000') || String(output ?? '').includes('30 * 1000')
  options:
    transform: '(output) => String(output ?? "").replace(/```[\\s\\S]*?```/g, "").trim()'

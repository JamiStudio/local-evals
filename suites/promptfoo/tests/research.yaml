- description: research — synthetic smoke
  metadata:
    taskId: research-synthetic-smoke
    lane: research
  vars:
    topic: Local OSS model placement for agent research tasks
    sources: |
      - LM Studio exposes OpenAI-compatible APIs for local GGUF models.
      - 8GB VRAM forces offload for 12B+ models.
      - Cloud models remain stronger for long-horizon synthesis.
  assert:
    - type: javascript
      value: (output || '').includes('VRAM')
    - type: javascript
      value: (output || '').includes('next')

- description: research — template (agent harness workflow)
  metadata:
    taskId: research-harness-tools
    lane: research
  vars:
    topic: Tool registry design for a harness product
    sources: |
      - Harness owns tool identity, permissions, approval, and audit mapping.
      - External connector catalogs sit behind adapters.
      - First prototype targets ten internal tools before breadth integrations.
  assert:
    - type: javascript
      value: (output || '').includes('tool')
    - type: javascript
      value: (output || '').length > 200

# W7 addition: briefs quality research-style case (daily interest + specialist harness)
# Exercises research lane for briefs quality vs baseline (taskId registered in baselines/manifest.json)
- description: daily-brief research (W7 interest tracker)
  metadata:
    taskId: daily-brief-synthetic-smoke
    lane: research
  vars:
    topic: Daily interest tracker for local OSS evals harness + qwen3.5-9b specialist placement on 8GB
    sources: |
      - Live matrix shows qwen/qwen3.5-9b @ gpu_offload at 63% smoke leader (offload win on plan/tool).
      - Harness: LM Studio only, Promptfoo + DeepEval, sandboxed tools in suites, real tools (gh/fs/web free) in host scripts.
      - Baselines imported only (no harness-paid calls); user-judge primary.
      - Specialist KB under docs/knowledge-bank/evals-specialist.md for briefs/plan/tool use.
  assert:
    - type: javascript
      value: (output || '').includes('qwen')
    - type: javascript
      value: (output || '').includes('brief')
    - type: javascript
      value: (output || '').length > 180 && ((output || '').toLowerCase().includes('token') || (output || '').toLowerCase().includes('tps') || (output || '').toLowerCase().includes('plan'))
